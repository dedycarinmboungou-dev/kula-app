<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12C98A"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Letter K — geometric, bold -->
  <!-- Vertical stem -->
  <rect x="138" y="128" width="72" height="256" rx="14" fill="white"/>

  <!-- Upper arm: diagonal from mid-stem to top-right -->
  <polygon points="210,248 210,128 348,128 348,172 272,256" fill="white"/>

  <!-- Lower arm: diagonal from mid-stem to bottom-right -->
  <polygon points="210,264 272,256 348,340 348,384 210,384" fill="white"/>

  <!-- Small leaf/sprout accent above K stem -->
  <g transform="translate(256, 96)">
    <!-- Left leaf petal -->
    <ellipse cx="-10" cy="0" rx="14" ry="22" fill="white" opacity="0.70" transform="rotate(-28)"/>
    <!-- Right leaf petal -->
    <ellipse cx="10" cy="0" rx="14" ry="22" fill="white" opacity="0.70" transform="rotate(28)"/>
    <!-- Stem -->
    <rect x="-4" y="-8" width="8" height="22" rx="4" fill="url(#bg)"/>
  </g>
</svg>
